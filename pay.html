<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT古亭6號 - 預約付款</title>
<style>
  body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; background: #f9f9f9; }
    h2 { color: #333; text-align: center; margin-bottom: 24px; }
      label { display: block; margin-top: 14px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
          button { width: 100%; margin-top: 28px; padding: 14px; background: #e07b00; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
            button:hover { background: #c96e00; }
            </style>
            </head>
            <body>
            <h2>MRT古亭6號 預約付款</h2>

            <label>教室：</label>
            <select id="room">
              <option value="01教室">01教室（4坪・7人・250元/時）</option>
                <option value="02教室">02教室（10坪・18人・450元/時）</option>
                  <option value="03教室">03教室（11坪・17人・450元/時）</option>
                  </select>

                  <label>姓名：</label>
                  <input type="text" id="name" placeholder="請輸入姓名">

                  <label>日期：</label>
                  <input type="date" id="date">

                  <label>時段：</label>
                  <input type="text" id="time" placeholder="例：08:00~12:00">

                  <label>金額（元）：</label>
                  <input type="number" id="amount" placeholder="例：1000">

                  <button onclick="goPay()">前往付款</button>

                  <script>
                  var GAS_URL = "https://script.google.com/macros/s/AKfycbwdZlymKB2DDt8Ol1s9yjV04nI1YtcdJhAsW-GpF9gGWx-XuHhk_C8btjW3whloyh2A/exec";

                  function goPay() {
                    var room   = document.getElementById("room").value;
                      var name   = document.getElementById("name").value;
                        var date   = document.getElementById("date").value;
                          var time   = document.getElementById("time").value;
                            var amount = document.getElementById("amount").value;

                              if (!name || !date || !time || !amount) {
                                  alert("請填寫所有欄位");
                                      return;
                                        }

                                          var payload = {
                                              action: "createOrder",
                                                  space:  room,
                                                      name:   name,
                                                          date:   date,
                                                              startTime: time.split("~")[0] || time,
                                                                  endTime:   time.split("~")[1] || time,
                                                                      price:  parseInt(amount)
                                                                        };

                                                                          window.location.href = GAS_URL + "?data=" + encodeURIComponent(JSON.stringify(payload));
                                                                          }
                                                                          </script>

                                                                          </body>
                                                                          </html>
